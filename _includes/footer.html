  <script>
    (function() {
      var toggle = document.getElementById('themeToggle');
      var stored = localStorage.getItem('aimarathi-theme');
      if (stored) document.documentElement.setAttribute('data-theme', stored);
      function updateIcon() {
        toggle.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '\u2600' : '\u263E';
      }
      updateIcon();
      toggle.addEventListener('click', function() {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('aimarathi-theme', next);
        updateIcon();
      });
      document.getElementById('navHamburger').addEventListener('click', function() {
        document.getElementById('navLinks').classList.toggle('open');
      });
      document.querySelectorAll('.dropdown-label').forEach(function(label) {
        label.addEventListener('click', function(e) {
          if (window.innerWidth <= 767) {
            e.preventDefault();
            this.parentElement.classList.toggle('mobile-open');
          }
        });
      });
      // Copy buttons on prompt-block and exercise boxes
      document.querySelectorAll('.prompt-block, .exercise').forEach(function(el) {
        el.classList.add('copy-wrap');
        var btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        btn.addEventListener('click', function() {
          var text = el.textContent.replace(/^Copy(ed!)?/, '').trim();
          // Remove the label text (e.g. "Command Prompt", exercise h4)
          var label = el.querySelector('.label, h4');
          if (label) text = text.replace(label.textContent, '').trim();
          navigator.clipboard.writeText(text).then(function() {
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(function() {
              btn.textContent = 'Copy';
              btn.classList.remove('copied');
            }, 1500);
          });
        });
        el.appendChild(btn);
      });
    })();
  </script>
